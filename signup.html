<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Gym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    /* ===== RESET & BASE ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: #2d2d2d;
        background: #f8f9fa;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
    }

    /* ===== DARK MODE ===== */
    body.dark-mode {
        background: #1a1a2e !important;
        color: #e0e0e0 !important;
    }

    body.dark-mode .signup-container {
        background: #2a2a3e !important;
        border-color: rgba(255, 255, 255, 0.05) !important;
    }

    body.dark-mode .signup-container .signup-header .logo-text {
        color: #ffffff !important;
    }

    body.dark-mode .signup-header h2 {
        color: #ffffff !important;
    }

    body.dark-mode .signup-header p {
        color: #cccccc !important;
    }

    body.dark-mode .form-group label {
        color: #dddddd !important;
    }

    body.dark-mode .form-group input,
    body.dark-mode .form-group select {
        background: #3a3a4e !important;
        color: #e0e0e0 !important;
        border-color: #4a4a5e !important;
    }

    body.dark-mode .form-group input:focus,
    body.dark-mode .form-group select:focus {
        background: #4a4a5e !important;
        border-color: #ff6b35 !important;
    }

    body.dark-mode .terms label {
        color: #cccccc !important;
    }

    body.dark-mode .login-link {
        color: #cccccc !important;
    }

    body.dark-mode .social-btn {
        background: #3a3a4e !important;
        color: #e0e0e0 !important;
        border-color: #4a4a5e !important;
    }

    body.dark-mode .social-btn:hover {
        background: rgba(255, 107, 53, 0.1) !important;
        border-color: #ff6b35 !important;
    }

    body.dark-mode .divider {
        color: #888888 !important;
    }

    body.dark-mode .divider::before,
    body.dark-mode .divider::after {
        background: #4a4a5e !important;
    }

    body.dark-mode .icon-btn {
        background: rgba(255, 255, 255, 0.05) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
        color: #e0e0e0 !important;
    }

    body.dark-mode .icon-btn:hover {
        background: #ff6b35 !important;
        color: #ffffff !important;
    }

    body.dark-mode .password-strength .text {
        color: #aaaaaa !important;
    }

    /* ===== RTL MODE ===== */
    html.rtl-mode {
        direction: rtl;
    }

    html.rtl-mode body {
        direction: rtl;
    }

    html.rtl-mode .signup-container {
        direction: rtl;
    }

    html.rtl-mode .signup-header h2,
    html.rtl-mode .signup-header p {
        direction: rtl;
        text-align: right;
    }

    html.rtl-mode .form-group label {
        direction: rtl;
        text-align: right;
    }

    html.rtl-mode .form-group .input-wrapper .input-icon {
        left: auto !important;
        right: 12px !important;
    }

    html.rtl-mode .form-group .input-wrapper input,
    html.rtl-mode .form-group .input-wrapper select {
        padding: 8px 40px 8px 40px !important;
        text-align: right;
    }

    html.rtl-mode .form-group .input-wrapper .toggle-password {
        right: auto !important;
        left: 12px !important;
    }

    html.rtl-mode .form-group .input-wrapper .select-arrow {
        right: auto !important;
        left: 14px !important;
    }

    html.rtl-mode .form-row {
        direction: rtl;
    }

    html.rtl-mode .terms {
        flex-direction: row-reverse !important;
    }

    html.rtl-mode .terms input[type="checkbox"] {
        margin-right: 0;
        margin-left: 10px;
    }

    html.rtl-mode .signup-btn {
        direction: rtl;
    }

    html.rtl-mode .signup-btn i {
        margin-right: 0 !important;
        margin-left: 10px !important;
    }

    html.rtl-mode .social-signup {
        direction: rtl;
    }

    html.rtl-mode .login-link {
        direction: rtl;
    }

    html.rtl-mode .divider {
        direction: rtl;
    }

    html.rtl-mode .icon-group {
        flex-direction: row-reverse;
    }

    /* ===== SIGNUP CONTAINER ===== */
    .signup-wrapper {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
    }

    .signup-container {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        padding: 16px 28px 14px;
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.04);
        animation: fadeInUp 0.6s ease;
        position: relative;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ===== LOGO INSIDE SIGNUP BOX ===== */
    .signup-header .logo-text {
        font-size: 26px;
        font-weight: 800;
        color: #ff6b35;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(135deg, #ff6b35, #ff4500);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: inline-block;
        margin-bottom: 4px;
        cursor: pointer;
    }

    .signup-header .logo-text::after {
        content: "⚡";
        font-size: 20px;
        -webkit-text-fill-color: initial;
        margin-left: 4px;
        color: #ff6b35;
    }

    /* ===== ICON GROUP OUTSIDE SIGNUP BOX ===== */
    .icon-group {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-bottom: 8px;
    }

    .icon-btn {
        background: rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.08);
        color: #2d2d2d;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border: none;
        outline: none;
    }

    .icon-btn:hover {
        background: #ff6b35;
        color: #fff;
        transform: scale(1.05);
        border-color: #ff6b35;
        box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
    }

    .signup-header {
        text-align: center;
        margin-bottom: 10px;
    }

    .signup-header h2 {
        font-size: 20px;
        color: #1a1a2e;
        font-weight: 800;
        margin-bottom: 2px;
    }

    .signup-header p {
        color: #888;
        font-size: 13px;
    }

    .signup-header p a {
        color: #ff6b35;
        text-decoration: none;
        font-weight: 600;
    }

    .signup-header p a:hover {
        text-decoration: underline;
    }

    /* ===== FORM STYLES - COMPACT ===== */
    .form-group {
        margin-bottom: 8px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 2px;
        font-size: 12px;
    }

    .form-group label .required {
        color: #ff6b35;
        margin-left: 2px;
    }

    .form-group .input-wrapper {
        position: relative;
    }

    .form-group .input-wrapper .input-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
        font-size: 13px;
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 1;
    }

    .form-group .input-wrapper input {
        width: 100%;
        padding: 8px 40px 8px 40px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        font-size: 13px;
        font-family: inherit;
        transition: all 0.3s ease;
        background: #fafafa;
        color: #2d2d2d;
    }

    .form-group .input-wrapper input:focus {
        outline: none;
        border-color: #ff6b35;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
    }

    .form-group .input-wrapper input:focus ~ .input-icon {
        color: #ff6b35;
    }

    .form-group .input-wrapper .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #999;
        font-size: 14px;
        transition: all 0.3s ease;
        background: none;
        border: none;
        padding: 4px;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .form-group .input-wrapper .toggle-password:hover {
        color: #ff6b35;
    }

    .form-group .input-wrapper .toggle-password:focus {
        outline: none;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .terms {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin: 8px 0 10px;
    }

    .terms input[type="checkbox"] {
        width: 15px;
        height: 15px;
        min-width: 15px;
        margin-top: 2px;
        accent-color: #ff6b35;
        cursor: pointer;
    }

    .terms label {
        font-size: 12px;
        color: #666;
        cursor: pointer;
        line-height: 1.5;
    }

    .terms label a {
        color: #ff6b35;
        text-decoration: none;
        font-weight: 600;
    }

    .terms label a:hover {
        text-decoration: underline;
    }

    .signup-btn {
        background: linear-gradient(135deg, #ff6b35, #e5532d);
        color: #fff;
        padding: 9px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
        box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
    }

    .signup-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
    }

    .signup-btn:active {
        transform: translateY(0);
    }

    .divider {
        display: flex;
        align-items: center;
        margin: 10px 0;
        color: #999;
        font-size: 12px;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e8e8e8;
    }

    .divider::before {
        margin-right: 15px;
    }

    .divider::after {
        margin-left: 15px;
    }

    .social-signup {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
    }

    .social-btn {
        padding: 7px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        color: #2d2d2d;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: inherit;
    }

    .social-btn:hover {
        border-color: #ff6b35;
        background: rgba(255, 107, 53, 0.04);
        transform: translateY(-2px);
    }

    .social-btn .fab {
        font-size: 16px;
    }

    .social-btn.google .fab {
        color: #DB4437;
    }

    .social-btn.facebook .fab {
        color: #4267B2;
    }

    .social-btn.apple .fab {
        color: #555555;
    }

    body.dark-mode .social-btn.apple .fab {
        color: #cccccc;
    }

    .login-link {
        text-align: center;
        margin-top: 10px;
        font-size: 13px;
        color: #666;
    }

    .login-link a {
        color: #ff6b35;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover {
        text-decoration: underline;
    }

    /* ===== MESSAGE ===== */
    .message {
        padding: 6px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 12px;
        display: none;
        text-align: center;
    }

    .message.error {
        background: #fee;
        color: #c00;
        border: 1px solid #fdd;
        display: block;
    }

    .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
        display: block;
        animation: pulse 1s ease;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }

    /* ===== PASSWORD STRENGTH ===== */
    .password-strength {
        margin-top: 3px;
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .password-strength .bar {
        flex: 1;
        height: 3px;
        background: #e8e8e8;
        border-radius: 2px;
        transition: all 0.3s ease;
    }

    .password-strength .bar.active {
        background: #ff6b35;
    }

    .password-strength .bar.active.weak {
        background: #ff4444;
    }

    .password-strength .bar.active.medium {
        background: #ffa500;
    }

    .password-strength .bar.active.strong {
        background: #00c853;
    }

    .password-strength .text {
        font-size: 10px;
        color: #888;
        min-width: 40px;
        text-align: right;
        transition: all 0.3s ease;
    }

    /* ===== SPINNER ===== */
    .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top: 3px solid #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .signup-btn.loading {
        opacity: 0.7;
        cursor: not-allowed;
    }

    .signup-btn.loading .btn-text {
        display: none;
    }

    .signup-btn.loading .spinner {
        display: block;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: #0a0a14;
    }

    ::-webkit-scrollbar-thumb {
        background: #ff6b35;
        border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #e5532d;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
        .signup-container {
            padding: 14px 18px 12px;
        }

        .signup-header h2 {
            font-size: 18px;
        }

        .form-row {
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .social-signup {
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            font-size: 13px;
        }

        .signup-header .logo-text {
            font-size: 22px;
        }

        .signup-wrapper {
            max-width: 100%;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 8px;
        }
        
        .signup-container {
            padding: 12px 14px 10px;
            border-radius: 16px;
        }

        .signup-header h2 {
            font-size: 16px;
        }

        .form-row {
            grid-template-columns: 1fr;
            gap: 0;
        }

        .social-signup {
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .signup-header .logo-text {
            font-size: 20px;
        }

        .signup-header .logo-text::after {
            font-size: 16px;
        }

        .signup-wrapper {
            max-width: 100%;
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            font-size: 12px;
        }

        .form-group input {
            font-size: 12px;
            padding: 7px 36px 7px 36px;
        }

        .signup-btn {
            font-size: 13px;
            padding: 8px;
        }

        .terms label {
            font-size: 11px;
        }

        .login-link {
            font-size: 12px;
            margin-top: 8px;
        }

        .divider {
            font-size: 11px;
            margin: 8px 0;
        }

        .social-btn {
            font-size: 11px;
            padding: 6px;
        }

        .social-btn .fab {
            font-size: 14px;
        }
    }
  </style>
</head>
<body>
  <div class="signup-wrapper">
    <!-- ===== ICON GROUP OUTSIDE SIGNUP BOX ===== -->
    <div class="icon-group">
      <button id="slide-toggle" class="icon-btn"><i class="fas fa-exchange-alt"></i></button>
      <button id="dark-light" class="icon-btn">
        <i class="fas fa-moon"></i>
      </button>
    </div>

    <div class="signup-container">
      <!-- ===== SIGNUP HEADER WITH LOGO ===== -->
      <div class="signup-header">
        <a href="index.html" class="logo-text" style="text-decoration: none;">GYM</a>
        <h2>Create Your Account</h2>
        <p>Start your fitness journey today</p>
      </div>

      <!-- ===== MESSAGE ===== -->
      <div id="message" class="message"></div>

      <!-- ===== SIGNUP FORM ===== -->
      <form id="signupForm">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Full Name <span class="required">*</span></label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="fas fa-user"></i></span>
              <input type="text" id="firstName" placeholder="John Doe" required>
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number <span class="required">*</span></label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="fas fa-phone"></i></span>
              <input type="tel" id="phone" placeholder="+91 98765 43210" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-envelope"></i></span>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="password" placeholder="Create a strong password" required>
            <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
          <!-- Password Strength -->
          <div class="password-strength">
            <div class="bar" id="strength1"></div>
            <div class="bar" id="strength2"></div>
            <div class="bar" id="strength3"></div>
            <span class="text" id="strengthText">Weak</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-check-circle"></i></span>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
          </div>
        </div>

        <div class="terms">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="signup-btn" id="signupBtn">
          <span class="btn-text"><i class="fas fa-user-plus" style="margin-right: 10px;"></i>Create Account</span>
          <div class="spinner"></div>
        </button>
      </form>

      <!-- ===== DIVIDER ===== -->
      <div class="divider">or sign up with</div>

      <!-- ===== SOCIAL SIGNUP ===== -->
      <div class="social-signup">
        <button class="social-btn google" onclick="socialSignup('Google')">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn facebook" onclick="socialSignup('Facebook')">
          <i class="fab fa-facebook"></i> Facebook
        </button>
        <button class="social-btn apple" onclick="socialSignup('Apple')">
          <i class="fab fa-apple"></i> Apple
        </button>
      </div>

      <!-- ===== LOGIN LINK ===== -->
      <div class="login-link">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    console.log("Signup page loaded!");

    // ===== 1. DARK/LIGHT MODE =====
    var darkBtn = document.getElementById('dark-light');
    var isDark = false;

    if (darkBtn) {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            darkBtn.innerHTML = '<i class="fas fa-sun"></i>';
            isDark = true;
        }

        darkBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isDark = !isDark;
            if (isDark) {
                document.body.classList.add('dark-mode');
                this.innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('darkMode', 'enabled');
                console.log("Dark mode ON");
            } else {
                document.body.classList.remove('dark-mode');
                this.innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('darkMode', 'disabled');
                console.log("Dark mode OFF");
            }
        });
    }

    // ===== 2. RTL/LTR TOGGLE =====
    var slideBtn = document.getElementById('slide-toggle');
    var isRTL = false;

    if (slideBtn) {
        if (localStorage.getItem('rtlMode') === 'enabled') {
            document.documentElement.classList.add('rtl-mode');
            isRTL = true;
        }

        slideBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isRTL = !isRTL;
            if (isRTL) {
                document.documentElement.classList.add('rtl-mode');
                localStorage.setItem('rtlMode', 'enabled');
                console.log("RTL mode ON");
            } else {
                document.documentElement.classList.remove('rtl-mode');
                localStorage.setItem('rtlMode', 'disabled');
                console.log("RTL mode OFF");
            }

            var container = document.querySelector('.signup-container');
            container.style.transition = 'all 0.5s ease';
            container.style.opacity = '0.7';
            setTimeout(function() {
                container.style.opacity = '1';
            }, 300);
        });
    }

    // ===== 3. TOGGLE PASSWORD =====
    function togglePassword() {
        var passwordInput = document.getElementById('password');
        var toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // ===== 4. PASSWORD STRENGTH =====
    document.getElementById('password').addEventListener('input', function() {
        var password = this.value;
        var bars = [
            document.getElementById('strength1'),
            document.getElementById('strength2'),
            document.getElementById('strength3')
        ];
        var text = document.getElementById('strengthText');
        
        var strength = 0;
        var level = 'weak';
        
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/\d/.test(password)) strength++;
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        
        if (password.length === 0) {
            bars.forEach(function(bar) { bar.className = 'bar'; });
            text.textContent = '';
            return;
        }
        
        if (strength <= 2) {
            level = 'weak';
            text.textContent = 'Weak';
            bars.forEach(function(bar) { 
                bar.className = 'bar active weak'; 
            });
        } else if (strength <= 4) {
            level = 'medium';
            text.textContent = 'Medium';
            bars.forEach(function(bar, index) { 
                if (index < 2) {
                    bar.className = 'bar active medium';
                } else {
                    bar.className = 'bar';
                }
            });
        } else {
            level = 'strong';
            text.textContent = 'Strong';
            bars.forEach(function(bar) { 
                bar.className = 'bar active strong'; 
            });
        }
    });

    // ===== 5. HANDLE SIGNUP =====
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var firstName = document.getElementById('firstName').value;
        var phone = document.getElementById('phone').value;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var terms = document.getElementById('terms').checked;
        var messageEl = document.getElementById('message');
        var signupBtn = document.getElementById('signupBtn');
        
        messageEl.className = 'message';
        messageEl.textContent = '';
        
        if (!firstName || !phone || !email || !password || !confirmPassword) {
            messageEl.className = 'message error';
            messageEl.textContent = '⚠️ Please fill in all required fields.';
            return;
        }
        
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            messageEl.className = 'message error';
            messageEl.textContent = '⚠️ Please enter a valid email address.';
            return;
        }
        
        if (password.length < 6) {
            messageEl.className = 'message error';
            messageEl.textContent = '⚠️ Password must be at least 6 characters long.';
            return;
        }
        
        if (password !== confirmPassword) {
            messageEl.className = 'message error';
            messageEl.textContent = '⚠️ Passwords do not match.';
            return;
        }
        
        if (!terms) {
            messageEl.className = 'message error';
            messageEl.textContent = '⚠️ Please agree to the Terms of Service and Privacy Policy.';
            return;
        }
        
        signupBtn.classList.add('loading');
        signupBtn.disabled = true;
        
        messageEl.className = 'message success';
        messageEl.textContent = '✅ Account created successfully! Redirecting to login...';
        
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 2000);
    });

    // ===== 6. SOCIAL SIGNUP =====
    function socialSignup(provider) {
        
        var messageEl = document.getElementById('message');
        messageEl.className = 'message success';
        messageEl.textContent = '✅ Connecting with ' + provider + '...';
        
        setTimeout(function() {
            messageEl.className = 'message success';
            messageEl.textContent = '✅ ' + provider + ' signup successful! Redirecting...';
            
            setTimeout(function() {
                window.location.href = 'login.html';
            }, 1500);
        }, 1000);
    }

    console.log("✅ All scripts loaded successfully!");
  </script>
</body>
</html>
